<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img
        src="assets/mentora-logo-transparent.png"
        alt="Mentora Logo"
        class="login-logo"
      />
      <p class="login-subtitle" i18n="@@login_management_subtitle">Sistema de Gestão</p>
    </div>
    <div class="login-form-container">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label class="form-label" for="emailInput" i18n="@@label_email">E-mail</label>
          <input
            type="email"
            class="form-input"
            id="emailInput"
            name="email"
            i18n-placeholder="@@placeholder_email"
            placeholder="seu@email.com"
            required
            [(ngModel)]="email"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="passwordInput" i18n="@@label_password">Senha</label>
          <input
            type="password"
            class="form-input"
            id="passwordInput"
            name="password"
            i18n-placeholder="@@placeholder_password"
            placeholder="Digite sua senha"
            required
            [(ngModel)]="password"
          />
        </div>
        <div class="login-controls">
          <label class="checkbox-wrapper">
            <input
              type="checkbox"
              class="checkbox-input"
              name="rememberMe"
              [(ngModel)]="rememberMe"
            />
            <span class="checkbox" [class.checked]="rememberMe"></span>
            <span class="checkbox-text" i18n="@@remember_me">Lembrar-me</span>
          </label>
          <a href="#" (click)="$event.preventDefault()" class="forgot-password" i18n="@@forgot_password"
            >Esqueceu a senha?</a
          >
        </div>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading || loginForm.invalid"
          style="width: 100%; padding: 1.125rem"
        >
          @if (loading) {
            <span i18n="@@login_loading">Entrando...</span>
          } @else {
            <span i18n="@@login_submit">Entrar</span>
          }
        </button>
        @if(errorMessage) {
          <p class="login-message error">{{ errorMessage }}</p>
        }
        @if(successMessage) {
          <p class="login-message success">{{ successMessage }}</p>
        }
      </form>
      <div class="social-login">
        <p class="social-login-text" i18n="@@social_login_text">Ou entre com</p>
        <div class="social-buttons">
          <button class="btn btn-ghost" type="button">🔵 Google</button>
          <button class="btn btn-ghost" type="button">🔷 Microsoft</button>
        </div>
      </div>
      <p class="signup-section" i18n="@@signup_text">
        Não tem uma conta?
        <a href="#" (click)="$event.preventDefault()" class="signup-link"
          >Cadastre-se</a
        >
      </p>
    </div>
  </div>
</div>
