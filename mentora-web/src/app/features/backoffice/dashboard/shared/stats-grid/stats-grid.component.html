<div class="stats-grid">
  <div class="stat-card" *ngFor="let item of items">
    <div class="stat-header">
      <div class="stat-icon">{{ item.icon }}</div>
      <div class="stat-trend" [ngClass]="item.trendDirection">{{ item.trend }}</div>
    </div>
    <p class="stat-label">{{ item.label }}</p>
    <h3 class="stat-value">{{ item.value }}</h3>
    <p class="stat-footer">{{ item.footer }}</p>
  </div>
</div>
