<div class="login-container">
  <div class="logo-background">
    <img src="assets/mentora-logo.png" alt="Mentora Logo" class="login-logo" />
  </div>
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Plataforma de aprendizagem</h1>
      <p class="login-subtitle">Entre na sua conta para continuar aprendendo</p>
    </div>

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="success-message">
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="seu@email.com"
          required
          [(ngModel)]="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Digite sua senha"
          required
          [(ngModel)]="password"
        />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-links">
      <a href="#" (click)="$event.preventDefault()" class="login-link">Esqueceu a senha?</a>
      <span class="login-divider">•</span>
      <a href="#" (click)="$event.preventDefault()" class="login-link">Criar nova conta</a>
    </div>
  </div>
</div>
