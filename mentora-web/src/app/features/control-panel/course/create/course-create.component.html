<div class="modal-overlay active" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">Create New Course</h3>
      <button type="button" class="modal-close" aria-label="Close" (click)="close()">×</button>
    </div>

    <form (ngSubmit)="submit(courseForm)" #courseForm="ngForm" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="nome">Nome <span class="required">*</span></label>
          <input
            id="nome"
            name="nome"
            type="text"
            class="form-input"
            [class.input-error]="nomeField.invalid && nomeField.touched"
            placeholder="Digite o nome do curso"
            [(ngModel)]="form.nome"
            required
            #nomeField="ngModel"
          />
          <span class="error-msg" *ngIf="nomeField.invalid && nomeField.touched">Nome é obrigatório.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="categoria">Categoria <span class="required">*</span></label>
          <select
            id="categoria"
            name="categoria"
            class="form-select"
            [class.input-error]="categoriaField.invalid && categoriaField.touched"
            [(ngModel)]="form.categoria"
            required
            #categoriaField="ngModel"
          >
            <option value="" disabled>Selecione uma categoria</option>
            <option>Mentoria</option>
            <option>Soft Skills</option>
            <option>Gestão</option>
            <option>Produto</option>
          </select>
          <span class="error-msg" *ngIf="categoriaField.invalid && categoriaField.touched">Categoria é obrigatória.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="cargaHoraria">Duração <span class="required">*</span></label>
          <input
            id="cargaHoraria"
            name="cargaHoraria"
            type="number"
            class="form-input"
            [class.input-error]="duracaoField.invalid && duracaoField.touched"
            placeholder="Ex.: 20h"
            [(ngModel)]="form.cargaHoraria"
            required
            #duracaoField="ngModel"
          />
          <span class="error-msg" *ngIf="duracaoField.invalid && duracaoField.touched">Duração é obrigatória.</span>
        </div>

        <div class="form-group form-group-inline">
          <label class="form-label">Opções</label>
          <div class="options-grid">
            <label class="checkbox">
              <input type="checkbox" name="ativo" [(ngModel)]="form.ativo" />
              <span>Curso ativo</span>
            </label>
            <label class="checkbox">
              <input type="checkbox" name="mostrarCertificado" [(ngModel)]="form.mostrarCertificado" />
              <span>Mostrar certificado</span>
            </label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="close()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="courseForm.invalid">Criar</button>
      </div>
    </form>
  </div>
</div>
