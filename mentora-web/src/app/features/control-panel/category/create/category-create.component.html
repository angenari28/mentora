<div class="modal-overlay active">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title" i18n="@@cp_cat_create_title">Nova Categoria</h3>
      <button type="button" class="modal-close" aria-label="Close" (click)="close()">×</button>
    </div>

    <form [formRoot]="categoryForm">
      <div class="modal-body">
        @if (categoryForm().pending()) {
          <div class="loading-overlay">
            <div class="spinner" i18n="@@cp_loading">carregando...</div>
          </div>
        }
        <div class="form-group">
          <label class="form-label" for="nome"
            ><ng-container i18n="@@cp_label_name">Nome</ng-container>
            @if (categoryForm.name().required()) {
              <span class="required">*</span>
            }
          </label>
          <input
            id="nome"
            type="text"
            class="form-input"
            [class.input-error]="categoryForm.name().invalid() && categoryForm.name().touched()"
            placeholder="Digite o nome da categoria"
            i18n-placeholder="@@cp_cat_placeholder_name"
            [formField]="categoryForm.name"
          />
          @if (categoryForm.name().invalid() && categoryForm.name().touched()) {
            @for (error of categoryForm.name().errors(); track $index) {
              <span class="error-msg">{{ error.message }}</span>
            }
          }
        </div>

        <div class="form-group form-group-inline">
          <label class="form-label" i18n="@@cp_label_options">Opções</label>
          <div class="options-grid">
            <label class="checkbox">
              <input type="checkbox" [formField]="categoryForm.active" />
              <span i18n="@@cp_cat_active_check">Categoria ativa</span>
            </label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="close()" i18n="@@cp_btn_cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" i18n="@@cp_btn_create">Criar</button>
      </div>
    </form>
  </div>
</div>
