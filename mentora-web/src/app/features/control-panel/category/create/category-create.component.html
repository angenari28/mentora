<div class="modal-overlay active" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">Nova Categoria</h3>
      <button type="button" class="modal-close" aria-label="Close" (click)="close()">×</button>
    </div>

    <form (ngSubmit)="submit(categoryForm)" #categoryForm="ngForm" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="nome">Nome <span class="required">*</span></label>
          <input
            id="nome"
            name="nome"
            type="text"
            class="form-input"
            [class.input-error]="nomeField.invalid && nomeField.touched"
            placeholder="Digite o nome da categoria"
            [(ngModel)]="form.nome"
            required
            #nomeField="ngModel"
          />
          <span class="error-msg" *ngIf="nomeField.invalid && nomeField.touched">Nome é obrigatório.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="descricao">Descrição <span class="required">*</span></label>
          <textarea
            id="descricao"
            name="descricao"
            class="form-input form-textarea"
            [class.input-error]="descricaoField.invalid && descricaoField.touched"
            placeholder="Descreva a categoria"
            [(ngModel)]="form.descricao"
            required
            rows="4"
            #descricaoField="ngModel"
          ></textarea>
          <span class="error-msg" *ngIf="descricaoField.invalid && descricaoField.touched">Descrição é obrigatória.</span>
        </div>

        <div class="form-group form-group-inline">
          <label class="form-label">Opções</label>
          <div class="options-grid">
            <label class="checkbox">
              <input type="checkbox" name="ativa" [(ngModel)]="form.ativa" />
              <span>Categoria ativa</span>
            </label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="close()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="categoryForm.invalid">Criar</button>
      </div>
    </form>
  </div>
</div>
