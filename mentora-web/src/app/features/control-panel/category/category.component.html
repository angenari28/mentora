<div class="content-wrapper">
  <div class="page-header">
    <h1 class="page-title">Categorias</h1>
    <p class="page-subtitle">Gerencie as categorias dos cursos.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h3 class="card-title">🏷️ Lista de Categorias</h3>
      <div class="card-actions">
        <button class="btn btn-sm btn-ghost">📥 Exportar</button>
        <button class="btn btn-sm btn-primary" routerLink="/control-panel/category/create">➕ Nova Categoria</button>
      </div>
    </div>
    <div class="card-body card-body-compact">
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Descrição</th>
              <th>Ativa</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            @for (category of categories(); track trackById($index, category)) {
            <tr>
              <td>{{ category.name }}</td>
              <td>{{ category.description }}</td>
              <td>
                <span class="badge" [ngClass]="category.active ? 'badge-success' : 'badge-warning'">
                  {{ category.active ? '✓ Ativa' : '⏸ Inativa' }}
                </span>
              </td>
              <td>
                <button class="btn btn-sm btn-ghost">Editar</button>
              </td>
            </tr>
          }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
