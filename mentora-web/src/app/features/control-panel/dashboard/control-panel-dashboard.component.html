<div class="content-wrapper">
  <div class="page-header">
    <h1 class="page-title" i18n="@@cp_dash_title">Control Panel</h1>
    <p class="page-subtitle" i18n="@@cp_dash_subtitle">Bem-vindo de volta! Aqui está o resumo de hoje.</p>
  </div>

  <app-stats-grid [stats]="stats"></app-stats-grid>

  <div class="content-grid">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title" i18n="@@cp_dash_overview_title">📊 Visão Geral</h3>
      </div>
      <div class="card-body">
        <div class="chart-placeholder">
          <div class="chart-placeholder-icon">📈</div>
          <p class="chart-placeholder-text" i18n="@@cp_dash_indicators">Indicadores consolidados do painel</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title" i18n="@@cp_dash_activities_title">🔔 Atividades Recentes</h3>
      </div>
      <div class="card-body card-body-compact">
        <div class="activity-list">
          @for (activity of activities; track $index) {
            <div class="activity-item">
              <div class="activity-icon">{{ activity.icon }}</div>
              <div class="activity-content">
                <p class="activity-title">{{ activity.title }}</p>
                <p class="activity-description">{{ activity.description }}</p>
                <span class="activity-time">{{ activity.time }}</span>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
