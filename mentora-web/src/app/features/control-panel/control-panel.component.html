<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-text">
        <img
          src="/assets/mentora-logo.png"
          alt="Mentora Logo"
          style="width: 179px; height: 50px"
        />
        <p class="logo-subtitle">Painel de Controle</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <h3 class="nav-section-title">Principal</h3>
        <a class="nav-item" routerLink="." routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a class="nav-item" routerLink="course" routerLinkActive="active">
          <span class="nav-icon">📘</span> Curso
        </a>
        <a class="nav-item nav-subitem" routerLink="course-slide" routerLinkActive="active">
          <span class="nav-icon">🖼️</span> Slides
        </a>
        <a class="nav-item" routerLink="category" routerLinkActive="active">
          <span class="nav-icon">🏷️</span> Categoria
        </a>
        <a class="nav-item" routerLink="class" routerLinkActive="active">
          <span class="nav-icon">🎓</span> Turma
        </a>
        <a class="nav-item" routerLink="student" routerLinkActive="active">
          <span class="nav-icon">👨‍🎓</span> Alunos
        </a>
        <a class="nav-item" routerLink="registration" routerLinkActive="active">
          <span class="nav-icon">📋</span> Matrícula
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">AS</div>
        <div class="user-info">
          <p class="user-name">Admin Silva</p>
          <p class="user-role">Administrador</p>
        </div>
        <a href="#" class="logout-link" (click)="logout($event)">Sair</a>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-navbar">
      <div class="navbar-search">
        <span class="search-icon">🔍</span>
        <input
          type="search"
          class="search-input"
          placeholder="Pesquisar por alunos, workspaces, turmas..."
        />
      </div>
      <div class="navbar-actions">
        <button class="navbar-btn">🔔</button>
        <button class="navbar-btn">⚙️</button>
      </div>
    </div>

    <router-outlet></router-outlet>
  </main>
</div>
